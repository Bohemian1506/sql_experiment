# docker-compose.yml（versionを削除）
services:
  web:
    build: .
    volumes:
      - .:/app
      - bundle:/usr/local/bundle
      - storage:/app/storage
      - log:/app/log
      - uploads:/app/public/uploads
      - tmp:/app/tmp
    ports:
      - "3000:3000"
    environment:
      - RAILS_ENV=development
    stdin_open: true
    tty: true

  setup:
    build: .
    volumes:
      - .:/app
      - bundle:/usr/local/bundle
    command: |
      bash -c "rails new . --force --database=sqlite3 --skip-docker --skip-test"

volumes:
  bundle:
  storage:
  log:
  uploads:
  tmp: